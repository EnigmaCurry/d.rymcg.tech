# NATS Authorization Example
#
# With verify_and_map, NATS maps the client certificate's SAN DNS name
# (e.g., foo.clients.nats.example.com) to a user entry below.
#
# Users not listed here will be denied access (unless default_permissions is set).
#
# See https://docs.nats.io/running-a-nats-service/configuration/securing_nats/authorization

authorization {
  # Default permissions apply to any authenticated user not explicitly listed.
  # Remove or comment this block to deny access to unlisted users.
  default_permissions = {
    publish: "SANDBOX.>"
    subscribe: "SANDBOX.>"
  }

  users = [
    # Example: user with full access to sensors subjects
    {
      user: "foo.clients.nats.example.com"
      permissions: {
        publish: ["sensors.>", "devices.>"]
        subscribe: ["sensors.>", "devices.>"]
      }
    }

    # Example: user with read-only access
    {
      user: "bar.clients.nats.example.com"
      permissions: {
        publish: {
          deny: ">"
        }
        subscribe: ["sensors.>", "devices.>"]
      }
    }

    # Example: user with allow/deny lists
    {
      user: "alice.clients.nats.example.com"
      permissions: {
        publish: {
          allow: ["events.>"]
          deny: ["events.admin.>"]
        }
        subscribe: {
          allow: ["events.>", "notifications.>"]
        }
      }
    }
  ]
}
