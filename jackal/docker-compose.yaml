version: '3'

volumes:
  etcd:
  pgsql:
  config:
  
services:
  etcd:
    image: quay.io/coreos/etcd:v3.4.16
    volumes:
      - etcd:/etcd_data
    command:
      - /usr/local/bin/etcd
      - -name
      - etcd
      - --data-dir
      - /etcd_data
      - -advertise-client-urls
      - http://etcd:2379
      - -listen-client-urls
      - http://0.0.0.0:2379
      - -initial-advertise-peer-urls
      - http://etcd:2380
      - -listen-peer-urls
      - http://0.0.0.0:2380

  pgsql:
    build:
      context: pgsql
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - pgsql:/var/lib/postgresql/data

  jackal-config:
    build:
      context: jackal-config
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - JACKAL_KEY
      - FORCE_CREATE_CONFIG
      - PRINT_CONFIG
    volumes:
      - config:/config
    command:
      - ./create-config.sh

  jackal:
    depends_on:
      - jackal-config
    build:
      context: jackal
    ports:
      - 5222:5222
      - 15280:15280
    networks:
      - default
    volumes:
      - config:/config
    environment:
      - JACKAL_LOG_STANZAS=on
      - JACKAL_CONFIG_FILE=/config/config.yaml
    depends_on:
      - etcd
      - pgsql
    command:
      - ./wait-for-it.sh
      - pgsql:5432
      - --
      - ./wait-for-it.sh
      - etcd:2379
      - --
      - ./jackal
