services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:${BITMAGNET_IMAGE}
    restart: unless-stopped
    depends_on:
      wireguard:
        condition: service_started
      postgres:     
        condition: service_healthy
    environment:
      - LOG_FILE_ROTATOR_ENABLED=true
      - LOG_LEVEL=warn
      - POSTGRES_HOST=172.20.0.3
      - POSTGRES_PASSWORD=${BITMAGNET_POSTGRES_PASSWORD}
      # - TMDB_API_KEY=your_api_key
    command:
      - worker
      - run
      #- --all
      - --keys=http_server    
      - --keys=queue_server
      - --keys=dht_crawler
    network_mode: service:wireguard
    volumes:
      # data folder currently only used for logs when file rotation is enabled
      - data:/root/.local/share/bitmagnet
    healthcheck:
      # bitmagnet's default healthcheck endpoint is port 9999
      test: "nc -z localhost 9999 || kill 1"
      interval: 1m
      timeout: 1m
      start_period: 300s

  wireguard-config:
    build:
      context: wireguard-config
    environment:
      - BITMAGNET_VPN_CLIENT_INTERFACE_PRIVATE_KEY=${BITMAGNET_VPN_CLIENT_INTERFACE_PRIVATE_KEY}
      - BITMAGNET_VPN_CLIENT_INTERFACE_IPV4=${BITMAGNET_VPN_CLIENT_INTERFACE_IPV4}
      - BITMAGNET_VPN_CLIENT_INTERFACE_IPV6=${BITMAGNET_VPN_CLIENT_INTERFACE_IPV6}
      - BITMAGNET_VPN_CLIENT_INTERFACE_LISTEN_PORT=${BITMAGNET_VPN_CLIENT_INTERFACE_LISTEN_PORT}
      - BITMAGNET_VPN_CLIENT_INTERFACE_PEER_DNS=${BITMAGNET_VPN_CLIENT_INTERFACE_PEER_DNS}
      - BITMAGNET_VPN_CLIENT_PEER_PUBLIC_KEY=${BITMAGNET_VPN_CLIENT_PEER_PUBLIC_KEY}
      - BITMAGNET_VPN_CLIENT_PEER_ALLOWED_IPS=${BITMAGNET_VPN_CLIENT_PEER_ALLOWED_IPS}
      - BITMAGNET_VPN_CLIENT_PEER_ENDPOINT=${BITMAGNET_VPN_CLIENT_PEER_ENDPOINT}
    volumes:
      - wireguard:/config

  wireguard:
    image: linuxserver/wireguard
    restart: unless-stopped
    depends_on: ['wireguard-config']
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${BITMAGNET_TIMEZONE}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - wireguard:/config
      - /lib/modules:/lib/modules
    networks:
      vpn:
        ipv4_address: 172.20.0.2
    ports:
      # The bitmagnet ports must be exposed by the wireguard container:
      - "3333:3333"
      # BitTorrent ports:
      - "3334:3334/tcp"
      - "3334:3334/udp"
    labels: []
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 | grep -q 'latest handshake'"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:${BITMAGNET_POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${BITMAGNET_POSTGRES_PASSWORD}
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    volumes:
      - postgres:/var/lib/postgresql/data
    shm_size: 1g
    networks:
      vpn:
        ipv4_address: 172.20.0.3
    #ports:
    #  - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      start_period: 20s

