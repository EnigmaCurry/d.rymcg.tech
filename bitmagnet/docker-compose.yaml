volumes:
  config:

services:
  bitmagnet:
    image: ${BITMAGNET_IMAGE}
    restart: unless-stopped
    environment:
      - LOG_FILE_ROTATOR_ENABLED=true
      - LOG_LEVEL=${BITMAGNET_LOG_LEVEL}
      - POSTGRES_HOST=${BITMAGNET_POSTGRES_HOST}
#      - POSTGRES_PASSWORD=${BITMAGNET_POSTGRES_PASSWORD}
      - POSTGRES_PORT=${BITMAGNET_POSTGRES_PORT}
      - POSTGRES_USER=${BITMAGNET_POSTGRES_USER}
      - POSTGRES_SSL_CERT_PATH=${BITMAGNET_POSTGRES_SSL_CERT_PATH}
      - POSTGRES_SSL_KEY_PATH=${BITMAGNET_POSTGRES_SSL_KEY_PATH}
      - POSTGRES_SSL_ROOT_CERT_PATH=${BITMAGNET_POSTGRES_SSL_ROOT_CERT_PATH}
      - POSTGRES_SSL_MODE=verify-full
    command:
      - worker
      - run
      #- --all
      - --keys=http_server
      - --keys=queue_server
      - --keys=dht_crawler
    volumes:
      - config:/root/.config/bitmagnet
    # ports:
