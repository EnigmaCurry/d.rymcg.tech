services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:${BITMAGNET_IMAGE}
    volumes:
      # Mount data folder (currently only used for logs when file rotation is enabled):
      - data:/root/.local/share/bitmagnet
    restart: unless-stopped
    environment:
      # Enable logging to rotating files for ingest to Loki:
      - LOG_FILE_ROTATOR_ENABLED=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${BITMAGNET_POSTGRES_PASSWORD}
      # - TMDB_API_KEY=your_api_key
    network_mode: service:wireguard
    depends_on:
      wireguard:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - worker
      - run
      # Run all workers:
      - --all
      # Or enable individual workers:
      # - --keys=http_server
      # - --keys=queue_server
      # - --keys=dht_crawler

  wireguard-config:
    build:
      context: wireguard-config
    environment:
      - BITMAGNET_VPN_CLIENT_INTERFACE_PRIVATE_KEY
      - BITMAGNET_VPN_CLIENT_INTERFACE_IPV4
      - BITMAGNET_VPN_CLIENT_INTERFACE_IPV6
      - BITMAGNET_VPN_CLIENT_INTERFACE_LISTEN_PORT
      - BITMAGNET_VPN_CLIENT_INTERFACE_PEER_DNS
      - BITMAGNET_VPN_CLIENT_PEER_PUBLIC_KEY
      - BITMAGNET_VPN_CLIENT_PEER_ALLOWED_IPS
      - BITMAGNET_VPN_CLIENT_PEER_ENDPOINT
    volumes:
      - wireguard:/config

  wireguard:
    depends_on: ['wireguard-config']
    image: linuxserver/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${BITMAGNET_TIMEZONE}
    volumes:
      - wireguard:/config
      - /lib/modules:/lib/modules
    restart: always
    labels: []
    #ports:
    #  # The bitmagnet ports must be exposed by the gluetun container:
    #  - "3333:3333"
    #  # BitTorrent ports:
    #  - "3334:3334/tcp"
    #  - "3334:3334/udp"
    ## Host names must be manually mapped here for bitmagnet to resolve them:
    #extra_hosts:
    #  - "postgres:192.168.55.11"


  postgres:
    image: postgres:${BITMAGNET_POSTGRES_IMAGE}
    volumes:
      - postgres:/var/lib/postgresql/data
    #networks:
    #  bitmagnet:
    #    ipv4_address: 192.168.55.11
    #ports:
    #  - "5432:5432"
    shm_size: 1g
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${BITMAGNET_POSTGRES_PASSWORD}
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      start_period: 20s

