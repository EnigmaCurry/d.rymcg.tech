## d-rymcg-tech image builder (GitHub Actions)
## Builds the Docker image from the master branch and pushes to ghcr.io.
## No secrets configuration needed — uses the built-in GITHUB_TOKEN.

name: Build d-rymcg-tech image

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 12)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          if docker buildx imagetools inspect "ghcr.io/${{ github.repository_owner }}/d-rymcg-tech:$SHA" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.exists != 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists != 'true'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists != 'true'
        with:
          context: .
          file: _container/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BRANCH=master
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/d-rymcg-tech:${{ steps.check.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/d-rymcg-tech:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/d-rymcg-tech:latest
          cache-to: type=inline

      - name: Clean up old image versions
        if: steps.check.outputs.exists != 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: d-rymcg-tech
          package-type: container
          min-versions-to-keep: 2
